function suite(name, fn) { tests.push({ type: 'suite', name, fn }); }

function test(name, fn) { tests.push({ type: 'test', name, fn }); }

function assert(val, msg) {
  if (!val) throw new Error(msg || `Expected truthy, got ${val}`);
}

function assertEqual(a, b, msg) {
  if (a !== b) throw new Error(msg || `Expected ${JSON.stringify(a)} === ${JSON.stringify(b)}`);
}

function assertClose(a, b, tol, msg) {
  if (Math.abs(a - b) > tol) throw new Error(msg || `Expected ${a} ≈ ${b} (tol ${tol})`);
}

function assertBetween(val, lo, hi, msg) {
  if (val < lo || val > hi) throw new Error(msg || `Expected ${val} between ${lo} and ${hi}`);
}

function skip(name) { tests.push({ type: 'skip', name }); }

// ═══════════════════════════════════════════════
// HELPER IMPLEMENTATIONS (pure, no imports)
// ═══════════════════════════════════════════════
function formatTime12(t) {
  if (!t || t === '--:--') return '--:--';
  const [h,m] = t.split(':').map(Number);
  const p = h >= 12 ? 'PM' : 'AM';
  return `${h%12||12}:${String(m).padStart(2,'0')} ${p}`;
}
function formatTime24(t) {
  if (!t || t === '--:--') return '--:--';
  const [h,m] = t.split(':').map(Number);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

const KAABA_LAT = 21.4225, KAABA_LNG = 39.8262;
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }
function qiblaBearing(lat, lng) {
  const lat1=toRad(lat), lng1=toRad(lng);
  const lat2=toRad(KAABA_LAT), lng2=toRad(KAABA_LNG);
  const dL = lng2-lng1;
  let b = Math.atan2(Math.sin(dL), Math.cos(lat1)*Math.tan(lat2)-Math.sin(lat1)*Math.cos(dL));
  return (toDeg(b)+360)%360;
}

function shortPath(current, target) {
  let diff = target - current;
  while (diff > 180) diff -= 360;
  while (diff < -180) diff += 360;
  return current + diff;
}

function clampTarget(v) { return Math.max(1, Math.min(9999, v)); }
function ringPct(count, target) { return target > 0 ? ((count % target) / target) * 100 : 0; }
function trackerPct(done, total) { return Math.round((done/total)*100); }
function trackerKey(date) {
  const y=date.getFullYear(), m=String(date.getMonth()+1).padStart(2,'0'), d=String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function buildLocHistory(n) {
  let locs = [];
  for (let i=1; i<=n; i++) {
    const newLoc = {city:`City${i}`, lat:0, lng:0, country:''};
    locs = locs.filter(l => l.city !== newLoc.city);
    locs.unshift(newLoc);
    if (locs.length > 5) locs.pop();
  }
  return locs;
}

// ═══════════════════════════════════════════════
// RUNNER
// ═══════════════════════════════════════════════
async function runAllTests() {
  passed = 0; failed = 0; skipped = 0;
  document.getElementById('results').innerHTML = '';
  document.getElementById('summaryEl').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressBar').style.width = '0%';

  const totalTests = tests.filter(t => t.type !== 'suite').length;
  let done = 0;
  let currentSuiteEl = null;
  const resultsEl = document.getElementById('results');

  for (const t of tests) {
    if (t.type === 'suite') {
      const div = document.createElement('div');
      div.className = 'suite';
      div.innerHTML = `<div class="suite-title">${t.name}</div>`;
      resultsEl.appendChild(div);
      currentSuiteEl = div;
      continue;
    }
    if (t.type === 'skip') {
      skipped++;
      const el = makeTestEl('skip', t.name, 'Skipped');
      (currentSuiteEl || resultsEl).appendChild(el);
      continue;
    }

    let err = null;
    try { t.fn(); }
    catch(e) { err = e; }

    if (!err) {
      passed++;
      const el = makeTestEl('pass', t.name, '');
      (currentSuiteEl || resultsEl).appendChild(el);
    } else {
      failed++;
      const el = makeTestEl('fail', t.name, err.message);
      (currentSuiteEl || resultsEl).appendChild(el);
    }
    done++;
    document.getElementById('progressBar').style.width = `${(done/totalTests)*100}%`;
    await new Promise(r => setTimeout(r, 8)); // tiny delay for animation
  }

  // Islamic UX Audit
  renderIslamicAudit(resultsEl);

  // Summary
  const total = passed + failed + skipped;
  const pct = Math.round((passed/total)*100);
  const summaryEl = document.getElementById('summaryEl');
  summaryEl.style.display = 'flex';
  summaryEl.innerHTML = `
    <div class="sum-item total"><span class="sum-val">${total}</span><span class="sum-lbl">Total</span></div>
    <div class="sum-item pass"><span class="sum-val">${passed}</span><span class="sum-lbl">Passed ✅</span></div>
    <div class="sum-item fail"><span class="sum-val">${failed}</span><span class="sum-lbl">Failed ❌</span></div>
    <div class="sum-item skip"><span class="sum-val">${skipped}</span><span class="sum-lbl">Skipped ⏭</span></div>
    <div class="sum-item total"><span class="sum-val" style="color:${pct===100?'#4ade80':pct>=80?'#fbbf24':'#f87171'}">${pct}%</span><span class="sum-lbl">Pass Rate</span></div>
  `;
  document.getElementById('progressBar').style.background = failed > 0 ? 'linear-gradient(90deg,#4ade80,#ef4444)' : 'linear-gradient(90deg,#4ade80,#22c55e)';
}

function makeTestEl(status, name, msg) {
  const el = document.createElement('div');
  el.className = `test ${status}`;
  const icon = status === 'pass' ? '✅' : status === 'fail' ? '❌' : '⏭';
  el.innerHTML = `
    <span class="badge ${status}">${icon} ${status.toUpperCase()}</span>
    <div class="test-detail">
      <div class="test-name">${name}</div>
      ${msg ? `<div class="test-msg">${msg}</div>` : ''}
    </div>`;
  return el;
}

    { icon:'🔔', name:'Adhan notification support', status:'ok', note:'Browser notifications at prayer time' },
    { icon:'🚫', name:'No ads, no login required', status:'ok', note:'Ad-free, privacy-first design' },
    { icon:'📵', name:'Works offline (PWA)', status:'ok', note:'Service worker caches content' },
    { icon:'🔢', name:'Ishraq time (15-20 min after sunrise)', status:'ok', note:'Sunnah prayer time shown' },
    { icon:'🌙', name:'Tahajjud time shown (last third of night)', status:'ok', note:'Based on API Lastthird time' },
    { icon:'⚡', name:'Response when no internet: uses cached data', status:'warn', note:'Verify service worker caching is active' },
    { icon:'🔤', name:'Arabic text rendered with proper font (Noto Naskh)', status:'ok', note:'RTL direction applied' },
    { icon:'📏', name:'Mobile layout: no text overlap on prayer cards', status:'ok', note:'Tracker button repositioned, padding-right added' },
  ];

  checks.forEach(c => {
    const row = document.createElement('div');
    row.className = 'ux-item';
    row.innerHTML = `
      <span class="ux-icon">${c.icon}</span>
      <div style="flex:1">
        <div style="font-size:0.85rem;font-weight:600;">${c.name}</div>
        <div style="font-size:0.75rem;color:#64748b;">${c.note}</div>
      </div>
      <span class="ux-status ${c.status}">${c.status === 'ok' ? '✅ Pass' : c.status === 'warn' ? '⚠️ Warn' : '❌ Fail'}</span>
    `;
    div.appendChild(row);
  });

  const ok   = checks.filter(c => c.status==='ok').length;
  const warn = checks.filter(c => c.status==='warn').length;
  const bad  = checks.filter(c => c.status==='bad').length;
  const summary = document.createElement('div');
  summary.style.cssText = 'margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.08);font-size:0.8rem;color:#94a3b8;';
  summary.innerHTML = `Islamic UX Score: <strong style="color:#4ade80">${ok}</strong> Pass &nbsp;|&nbsp; <strong style="color:#fbbf24">${warn}</strong> Warn &nbsp;|&nbsp; <strong style="color:#f87171">${bad}</strong> Fail &nbsp;— <strong style="color:#d4af37">${Math.round(ok/(ok+warn+bad)*100)}% Islamic Compliance</strong>`;
  div.appendChild(summary);
  container.appendChild(div);
}

// Auto-run on load
window.addEventListener('load', () => runAllTests());
</script>
</body>
</html>
